<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Vault</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<section class="screen active" id="intro">
  <h1>Memory Vault</h1>
  <p>Một món quà được khóa lại ✨</p>
  <button onclick="goLock()">Mở quà</button>
</section>

<section class="screen" id="lock">
  <h2>Nhập mật mã</h2>

  <div class="code">
    <input maxlength="1" id="a">
    <input maxlength="1" id="b">
    <input maxlength="1" id="c">
    <input maxlength="1" id="d">
  </div>

  <button onclick="unlock()">Unlock</button>
  <p id="msg"></p>
</section>

<section class="screen" id="gift">
  <div class="card">
    <h1>✨ Chúc mừng ✨</h1>
    <p>Chúc em một năm thật bình yên và hạnh phúc.</p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
