<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Vault 🎁</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<section class="intro" id="intro">
  <h1>A Memory Locked Inside</h1>
  <p>Nhập 4 số để mở kỷ niệm ✨</p>
  <button onclick="showLock()">Enter</button>
</section>

<section class="lock" id="lock">
  <h2>Enter Passcode</h2>

  <div class="inputs">
    <input maxlength="1" id="a">
    <input maxlength="1" id="b">
    <input maxlength="1" id="c">
    <input maxlength="1" id="d">
  </div>

  <button onclick="check()">Unlock</button>
  <p id="msg"></p>
</section>

<section class="content" id="content">
  <h1 class="type">Chúc em một năm thật đẹp ✨</h1>
  <p>Những ký ức này được giữ lại dành riêng cho em.</p>

  <div class="cards">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>
</section>

<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
