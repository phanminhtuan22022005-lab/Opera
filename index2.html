<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Gift From 18DL 🎁</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#050816,#0d1b3d,#1c2d63);
overflow:hidden;
}

.stars{
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px,transparent 1px),
radial-gradient(#8ec5ff 1px,transparent 1px);
background-size:80px 80px,150px 150px;
animation:moveStars 25s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

.card{
position:relative;
z-index:2;
width:340px;
padding:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 0 25px rgba(255,255,255,.2);
}

h1{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:18px;
text-align:center;
margin-top:15px;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:12px;
background:#6f7cff;
color:white;
font-size:18px;
cursor:pointer;
}

#message{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<div class="stars"></div>

<div class="card">
<h1>🎁 A Gift From 18DL</h1>

<p>Nhập mã bí mật để mở quà</p>

<input id="code" maxlength="4" type="password">

<button>Mở quà</button>

<div id="message"></div>

</div>

</body>
</html>
